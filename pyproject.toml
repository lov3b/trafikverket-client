[project]
name = "trafikverket-client"
version = "0.1.0"
description = "En inofficiell klient för Trafikverket"
readme = "README.md"
authors = [
    { name = "Love Billenius", email = "love@billenius.com" }
]
requires-python = ">=3.13"
dependencies = [
    "aiohttp>=3.13",
    "pydantic>=2.13",
]

[project.optional-dependencies]
qr = ["qrcode>=8.0"]

[build-system]
requires = ["uv_build>=0.11.4,<0.12.0"]
build-backend = "uv_build"
